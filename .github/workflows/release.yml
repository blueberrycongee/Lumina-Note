name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Check changelog exists for this version
        run: npx ts-node scripts/parse_changelog.ts check "${{ github.ref_name }}"

  # Pre-create the GitHub release once, before the matrix kicks off.
  # Otherwise three parallel runners race to POST /releases with the same
  # tag — first one wins, the other two get HTTP 422 already_exists and
  # the build job dies with no Windows installer published. Pre-creating
  # the release means every matrix runner finds an existing release and
  # only uploads assets to it (no create-race).
  create-release:
    needs: check-changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — matrix builds will upload to it"
            exit 0
          fi
          NOTES="$(npx ts-node scripts/parse_changelog.ts get "$TAG")"
          gh release create "$TAG" --title "$TAG" --notes "$NOTES"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            script: dist:mac
          - platform: windows-latest
            script: dist:win
          - platform: ubuntu-latest
            script: dist:linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stub opencode server bundle for CI
        shell: bash
        run: |
          mkdir -p thirdparty/opencode/packages/opencode/dist/node
          cat > thirdparty/opencode/packages/opencode/dist/node/node.js << 'STUB'
          export const Log = { init: async () => {} };
          export const Server = { listen: async () => ({ url: new URL("http://localhost:0"), stop: () => {} }) };
          STUB

      - name: Build renderer + main
        run: npm run build

      - name: Package + publish via electron-builder
        run: npm run ${{ matrix.script }} -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing is currently unsigned. Disable identity auto-discovery
          # so electron-builder doesn't try to load empty CSC_LINK as a file.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
