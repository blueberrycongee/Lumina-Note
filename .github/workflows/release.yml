name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Check changelog exists for this version
        run: npx ts-node scripts/parse_changelog.ts check "${{ github.ref_name }}"

  build:
    needs: check-changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            script: dist:mac
          - platform: windows-latest
            script: dist:win
          - platform: ubuntu-latest
            script: dist:linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stub opencode server bundle for CI
        run: |
          mkdir -p thirdparty/opencode/packages/opencode/dist/node
          cat > thirdparty/opencode/packages/opencode/dist/node/node.js << 'STUB'
          export const Log = { init: async () => {} };
          export const Server = { listen: async () => ({ url: new URL("http://localhost:0"), stop: () => {} }) };
          STUB

      - name: Build renderer + main
        run: npm run build

      - name: Package + publish via electron-builder
        run: npm run ${{ matrix.script }} -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
