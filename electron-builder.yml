appId: com.luminanote.app
productName: Lumina Note

# Targets: mac arm64+x64 (dmg+zip), win x64 (nsis), linux AppImage.
# Publishing goes through GitHub Releases; electron-updater reads the
# `latest.yml` / `latest-mac.yml` artifacts this produces.

publish:
  provider: github
  owner: blueberrycongee
  repo: Lumina-Note
  releaseType: release

directories:
  buildResources: build-resources
  output: release

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources/plugins
    to: plugins
    filter: ['**/*']
  - from: resources/skills
    to: skills
    filter: ['**/*']
  - from: resources/agent
    to: agent
    filter: ['**/*']

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: build-resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build-resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build-resources/icon.png
  category: Office
